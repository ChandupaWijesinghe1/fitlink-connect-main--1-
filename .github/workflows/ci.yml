name: CI - Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========= BACKEND TESTS =========
  backend-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run backend tests (authController & messageController)
        run: |
          cd backend
          npm test -- --forceExit
      
      - name: Test success message
        if: success()
        run: echo "✅ All backend tests passed successfully!"
      
      - name: Test failure message
        if: failure()
        run: echo "❌ Backend tests failed!"

